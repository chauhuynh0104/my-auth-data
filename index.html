<html lang="vi">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="theme-color" content="#0078d7">
  <meta name="description" content="Ứng dụng tra cứu mã ICD-10">
  <title>Tra cứu ICD</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8f9fa;
      --text-color: #333;
      --container-bg: #fff;
      --input-border: #ced4da;
      --input-focus: #80bdff;
      --primary-color: #0078d7;
      --primary-hover: #0069c0;
      --table-header: #0078d7;
      --table-border: #e9ecef;
      --table-row-even: #f8f9fa;
      --shadow-color: rgba(0,0,0,0.1);
      --success-color: #28a745;
      --error-color: #dc3545;
      --warning-color: #ffc107;
      --border-radius: 8px;
      --transition: all 0.2s ease-in-out;
    }

    [data-theme="dark"] {
      --bg-color: #0d1117;
      --text-color: #e0e0e0;
      --container-bg: #161b22;
      --input-border: #30363d;
      --input-focus: #4da6ff;
      --primary-color: #4da6ff;
      --primary-hover: #3a8bd9;
      --table-header: #1f242c;
      --table-border: #444;
      --table-row-even: #0d1117;
      --shadow-color: rgba(1,4,9,0.5);
    }

    body {
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-color) 0%, #ebedee 100%);
      padding: 20px;
      color: var(--text-color);
      transition: var(--transition);
      line-height: 1.6;
      min-height: 100vh;
    }

    [data-theme="dark"] body {
      background: linear-gradient(135deg, var(--bg-color) 0%, #161b22 100%);
    }

    .container {
      max-width: 1400px;
      margin: 30px auto;
      background: var(--container-bg);
      padding: 30px;
      border-radius: var(--border-radius);
      box-shadow: 0 10px 30px var(--shadow-color);
      transition: var(--transition);
    }

    h1 {
      text-align: center;
      color: var(--primary-color);
      margin-bottom: 30px;
      font-weight: 700;
      font-size: 2.2rem;
      position: relative;
      padding-bottom: 15px;
    }

    h1:after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 3px;
      background: var(--primary-color);
      border-radius: 3px;
    }

    .search-container {
      position: relative;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 15px 20px 15px 45px;
      font-size: 16px;
      border-radius: var(--border-radius);
      border: 2px solid var(--input-border);
      background: var(--container-bg);
      color: var(--text-color);
      transition: var(--transition);
      box-sizing: border-box;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%236c757d" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>');
      background-repeat: no-repeat;
      background-position: 15px center;
    }

    input:focus {
      outline: none;
      border-color: var(--input-focus);
      box-shadow: 0 0 0 0.2rem rgba(0, 120, 215, 0.25);
      transform: translateY(-2px);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 15px;
      margin-top: 25px;
      display: none;
    }

    .icd-card {
      border-radius: var(--border-radius);
      padding: 15px;
      background: var(--container-bg);
      box-shadow: 0 3px 10px var(--shadow-color);
      border-left: 4px solid var(--primary-color);
      transition: transform 0.2s;
    }

    .icd-card:hover {
      transform: translateY(-3px);
    }

    .icd-code {
      font-weight: bold;
      color: var(--primary-color);
      margin-bottom: 8px;
    }

    .icd-desc h3 {
      margin: 0 0 5px 0;
      font-size: 1.05em;
    }

    .icd-desc p {
      margin: 0 0 10px 0;
      font-size: 0.9em;
      color: var(--text-color);
      opacity: 0.8;
      font-style: italic;
    }

    .card-sub-list {
      border-top: 1px dashed var(--input-border);
      padding-top: 8px;
      margin-top: 8px;
      font-size: 0.9em;
    }

    .card-sub-item {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }

    .card-sub-code {
      font-family: monospace;
      font-weight: bold;
      color: #e67e22;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
      font-size: 15px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      border-radius: var(--border-radius);
      overflow: hidden;
      display: none;
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid var(--table-border);
      vertical-align: middle;
    }

    th {
      background-color: var(--table-header);
      color: white;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.5px;
    }

    tr:nth-child(even) {
      background-color: var(--table-row-even);
    }

    tr:hover {
      background-color: rgba(0, 120, 215, 0.05);
    }

    .sub-cell-item {
      padding: 6px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    [data-theme="dark"] .sub-cell-item {
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .sub-cell-item:last-child {
      border-bottom: none;
    }

    .no-results {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
      color: #6c757d;
      padding-top: 20px;
      border-top: 1px solid var(--table-border);
    }

    .footer a {
      color: var(--primary-color);
      text-decoration: none;
    }

    .theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px var(--shadow-color);
      z-index: 100;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.75em;
      font-weight: bold;
      background: var(--primary-color);
      color: white;
      margin-left: 10px;
    }

    .results-count {
      margin-top: 15px;
      font-size: 0.9em;
      color: #6c757d;
      text-align: right;
      display: none;
    }

    .view-toggle {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .view-toggle button {
      background: none;
      border: none;
      color: var(--text-color);
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 4px;
      margin-left: 5px;
    }

    .view-toggle button.active {
      background: var(--primary-color);
      color: white;
    }

    @media (max-width: 992px) {
      th, td {
        padding: 10px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">🌓</button>

  <div class="container">
    <h1>Tra cứu ICD-10 <span class="badge">Phiên bản 2.0</span></h1>
    
    <div class="search-container">
      <input type="text" id="searchInput" autocomplete="off" placeholder="Nhập mã ICD, tên bệnh, thể lâm sàng hoặc mã hoá...">
    </div>
    
    <div id="results">
      <div class="view-toggle" id="viewToggle">
        <button class="active" data-view="table">Bảng</button>
        <button data-view="grid">Thẻ</button>
      </div>

      <div id="resultsCount" class="results-count"></div>
      
      <table id="resultsTable">
        <thead>
          <tr>
            <th style="width: 12%;">Mã YHCT</th>
            <th style="width: 12%;">Mã YHHĐ</th>
            <th style="width: 34%;">Tên bệnh</th>
            <th style="width: 25%;">Thể lâm sàng</th>
            <th style="width: 17%;">Mã hoá</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>

      <div id="resultsGrid" class="results-grid"></div>
      
      <div id="noResults" class="no-results">
        <h3>Không tìm thấy kết quả</h3>
        <p>Thử với từ khóa ngắn gọn hơn hoặc mã ICD khác</p>
      </div>
    </div>
    
    <div class="footer">
      © 2014-2026 By <a href="http://fb.com/chauhuynh0104" target="_blank">Dr. Châu</a>
    </div>
  </div>

    let currentView = 'table';

    function searchICD() {
      const query = document.getElementById("searchInput").value.trim().toLowerCase();
      const resultsBody = document.getElementById("resultsBody");
      const resultsGrid = document.getElementById("resultsGrid");
      const resultsTable = document.getElementById("resultsTable");
      const resultsCount = document.getElementById("resultsCount");
      const noResults = document.getElementById("noResults");
      const viewToggle = document.getElementById("viewToggle");
      
      resultsBody.innerHTML = "";
      resultsGrid.innerHTML = "";
      resultsCount.style.display = "none";
      noResults.style.display = "none";
      viewToggle.style.display = "none";

      if (query.length === 0) {
        resultsTable.style.display = "none";
        resultsGrid.style.display = "none";
        return;
      }

      const matches = icdData.filter(item => {
        const matchMain = item.code.toLowerCase().includes(query) ||
                          item.vietnamese.toLowerCase().includes(query) ||
                          item.english.toLowerCase().includes(query);
        
        const matchVariants = item.variants && item.variants.some(v => 
          v.clinical.toLowerCase().includes(query) || 
          v.customCode.toLowerCase().includes(query)
        );
        
        return matchMain || matchVariants;
      });

      if (matches.length === 0) {
        resultsTable.style.display = "none";
        resultsGrid.style.display = "none";
        noResults.style.display = "block";
        return;
      }

      viewToggle.style.display = "flex";
      resultsCount.style.display = "block";
      resultsCount.textContent = `Tìm thấy ${matches.length} kết quả`;

      if (currentView === 'table') {
        displayResultsAsTable(matches);
      } else {
        displayResultsAsGrid(matches);
      }
    }

    function displayResultsAsTable(matches) {
      const resultsBody = document.getElementById("resultsBody");
      const resultsTable = document.getElementById("resultsTable");
      
      document.getElementById("resultsGrid").style.display = "none";
      resultsTable.style.display = "table";

      matches.forEach(item => {
        const row = document.createElement("tr");
        
        const codeCell = document.createElement("td");
        codeCell.textContent = item.code;
        codeCell.style.fontWeight = "bold";
        codeCell.style.color = "var(--primary-color)";
        
        const vnCell = document.createElement("td");
        vnCell.textContent = item.vietnamese;
        
        const enCell = document.createElement("td");
        enCell.textContent = item.english;
        enCell.style.fontStyle = "italic";
        
        const clinicalCell = document.createElement("td");
        const customCodeCell = document.createElement("td");
        
        if (item.variants && item.variants.length > 0) {
          item.variants.forEach(v => {
            const divClinical = document.createElement("div");
            divClinical.className = "sub-cell-item";
            divClinical.textContent = v.clinical;
            clinicalCell.appendChild(divClinical);

            const divCode = document.createElement("div");
            divCode.className = "sub-cell-item";
            divCode.textContent = v.customCode;
            divCode.style.fontWeight = "bold";
            divCode.style.color = "#e67e22";
            customCodeCell.appendChild(divCode);
          });
        } else {
          clinicalCell.innerHTML = `<span style="color:#999; font-style:italic;"></span>`;
          customCodeCell.innerHTML = `<span style="color:#999; font-style:italic;"></span>`;
        }
        
        row.appendChild(codeCell);
        row.appendChild(vnCell);
        row.appendChild(enCell);
        row.appendChild(clinicalCell);
        row.appendChild(customCodeCell);
        resultsBody.appendChild(row);
      });
    }

    function displayResultsAsGrid(matches) {
      const MathGrid = document.getElementById("resultsGrid");
      document.getElementById("resultsTable").style.display = "none";
      resultsGrid.style.display = "grid";

      matches.forEach(item => {
        const card = document.createElement("div");
        card.className = "icd-card";
        
        const codeDiv = document.createElement("div");
        codeDiv.className = "icd-code";
        codeDiv.textContent = item.code;
        
        const descDiv = document.createElement("div");
        descDiv.className = "icd-desc";
        
        const vnTitle = document.createElement("h3");
        vnTitle.textContent = item.vietnamese;
        
        const enPara = document.createElement("p");
        enPara.textContent = item.english;
        
        descDiv.appendChild(vnTitle);
        descDiv.appendChild(enPara);
        card.appendChild(codeDiv);
        card.appendChild(descDiv);
        
        if (item.variants && item.variants.length > 0) {
          const subList = document.createElement("div");
          subList.className = "card-sub-list";
          
          item.variants.forEach(v => {
            const subItem = document.createElement("div");
            subItem.className = "card-sub-item";
            subItem.innerHTML = `<span>${v.clinical}</span><span class="card-sub-code">${v.customCode}</span>`;
            subList.appendChild(subItem);
          });
          card.appendChild(subList);
        }
        
        resultsGrid.appendChild(card);
      });
    }

    function setupViewToggle() {
      const viewToggle = document.getElementById("viewToggle");
      viewToggle.addEventListener("click", function(e) {
        if (e.target.tagName === 'BUTTON') {
          const view = e.target.dataset.view;
          if (view === currentView) return;
          
          currentView = view;
          document.querySelectorAll('#viewToggle button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.view === view);
          });
          searchICD();
        }
      });
    }

 function setupThemeToggle() {
      const themeToggle = document.getElementById("themeToggle");
      const currentTheme = localStorage.getItem("theme") || "light";

      if (currentTheme === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }

      themeToggle.addEventListener("click", function() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        if (currentTheme === "dark") {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("theme", "light");
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("theme", "dark");
        }
      });
    }

    // KHU VỰC SỬA ĐỔI: Tối ưu bộ lắng nghe sự kiện khi Trang tải xong
    window.addEventListener("DOMContentLoaded", function() {
      setupThemeToggle();
      setupViewToggle();
      
      let searchTimeout = null;
      const searchInput = document.getElementById("searchInput");

      // Sử dụng Timer trực tiếp để tạo hiệu ứng Debounce không lỗi
      searchInput.addEventListener("input", function() {
        // 1. Xóa hẹn giờ cũ nếu anh vẫn đang gõ liên tục
        clearTimeout(searchTimeout); 
        
        // 2. Thiết lập hẹn giờ mới: Ngừng gõ đủ 300ms thì mới kích hoạt tìm kiếm
        searchTimeout = setTimeout(function() {
          searchICD();
        }, 300);
      });
    });
	// Hàm bổ trợ xử lý sao chép dữ liệu và tạo hiệu ứng phản hồi trực quan
    function copyToClipboard(text, element) {
      if (!text || text.includes("Không tìm thấy") || text.trim() === "") return;
      
      navigator.clipboard.writeText(text).then(() => {
        // Tạo hiệu ứng đổi màu nền tạm thời để báo hiệu đã copy thành công
        const originalBg = element.style.backgroundColor;
        const originalColor = element.style.color;
        
        element.style.backgroundColor = "var(--success-color, #28a745)";
        element.style.color = "#fff";
        element.style.transition = "all 0.15s ease-in-out";
        
        setTimeout(() => {
          element.style.backgroundColor = originalBg;
          element.style.color = originalColor;
        }, 300);
      }).catch(err => {
        console.error('Lỗi khi sao chép: ', err);
      });
    }

    function displayResultsAsTable(matches) {
      const resultsBody = document.getElementById("resultsBody");
      const resultsTable = document.getElementById("resultsTable");
      
      document.getElementById("resultsGrid").style.display = "none";
      resultsTable.style.display = "table";

      matches.forEach(item => {
        const row = document.createElement("tr");
        
        // 1. Cột Mã YHCT
        const codeCell = document.createElement("td");
        codeCell.textContent = item.code;
        codeCell.style.fontWeight = "bold";
        codeCell.style.color = "var(--primary-color)";
        codeCell.style.cursor = "pointer";
        codeCell.title = "Click để copy Mã YHCT";
        codeCell.addEventListener("click", () => copyToClipboard(item.code, codeCell));
        
        // 2. Cột Mã YHHĐ
        const vnCell = document.createElement("td");
        vnCell.textContent = item.vietnamese;
        vnCell.style.cursor = "pointer";
        vnCell.title = "Click để copy Mã YHHĐ";
        vnCell.addEventListener("click", () => copyToClipboard(item.vietnamese, vnCell));
        
        // 3. Cột Tên bệnh
        const enCell = document.createElement("td");
        enCell.textContent = item.english;
        enCell.style.fontStyle = "italic";
        enCell.style.cursor = "pointer";
        enCell.title = "Click để copy Tên bệnh";
        enCell.addEventListener("click", () => copyToClipboard(item.english, enCell));
        
        // 4 & 5. Thể lâm sàng và Mã hoá
        const clinicalCell = document.createElement("td");
        const customCodeCell = document.createElement("td");
        
        if (item.variants && item.variants.length > 0) {
          item.variants.forEach(v => {
            const divClinical = document.createElement("div");
            divClinical.className = "sub-cell-item";
            divClinical.textContent = v.clinical;
            divClinical.style.cursor = "pointer";
            divClinical.title = "Click để copy Thể lâm sàng";
            divClinical.addEventListener("click", (e) => {
              e.stopPropagation(); // Tránh kích hoạt sự kiện click của hàng cha
              copyToClipboard(v.clinical, divClinical);
            });
            clinicalCell.appendChild(divClinical);

            const divCode = document.createElement("div");
            divCode.className = "sub-cell-item";
            divCode.textContent = v.customCode;
            divCode.style.fontWeight = "bold";
            divCode.style.color = "#e67e22";
            divCode.style.cursor = "pointer";
            divCode.title = "Click để copy Mã hoá";
            divCode.addEventListener("click", (e) => {
              e.stopPropagation();
              copyToClipboard(v.customCode, divCode);
            });
            customCodeCell.appendChild(divCode);
          });
        } else {
          clinicalCell.innerHTML = `<span style="color:#999; font-style:italic;"></span>`;
          customCodeCell.innerHTML = `<span style="color:#999; font-style:italic;"></span>`;
        }
        
        row.appendChild(codeCell);
        row.appendChild(vnCell);
        row.appendChild(enCell);
        row.appendChild(clinicalCell);
        row.appendChild(customCodeCell);
        resultsBody.appendChild(row);
      });
    }
